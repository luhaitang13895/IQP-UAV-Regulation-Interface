<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ region.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <a class="back-link" href="{{ url_for('home') }}">← Back to Home</a>

        <h1>{{ region.name }}</h1>
        <p>Select a category.</p>

        <div class="card-grid">
            {% for cat_key, cat in region.categories.items() %}
                <a class="card" href="{{ url_for('category_page', region_key=region_key, category_key=cat_key) }}">
                    <h2>{{ cat.title }}</h2>
                    <p>View details</p>
                </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
